<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Easy Order Booking</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>🏠 Easy Order Booking</h1>

<div class="features">
<p>✓ Fast Delivery</p>
<p>✓ Secure Service</p>
<p>✓ Cash on Delivery Available</p>
<p>✓ WhatsApp Support</p>
</div>

<form id="orderForm">

<input type="text" id="name" placeholder="Full Name" required>

<input type="tel" id="phone" placeholder="Mobile Number" required>

<textarea id="address" placeholder="Complete Address" required></textarea>

<input type="text" id="city" placeholder="City" required>

<input type="text" id="state" placeholder="State" required>

<input type="text" id="pincode" placeholder="Pincode" required>

<input type="text" id="product" placeholder="Product Name" required>

<input type="number" id="quantity" placeholder="Quantity" required>

<textarea id="notes" placeholder="Additional Notes"></textarea>

<h3>Payment Method</h3>

<select id="payment">
<option value="COD">Cash On Delivery</option>
<option value="PhonePe">PhonePe</option>
</select>

<div id="phonepeBox">

<p><b>PhonePe Number:</b> 7737449178</p>

<input type="text" id="utr" placeholder="Transaction ID">

<input type="number" id="amount" placeholder="Payment Amount">

</div>

<button type="submit">
Submit Order
</button>

</form>

</div>

<a href="https://wa.me/917737449178" class="whatsapp">
WhatsApp
</a>

<script src="script.js"></script>

</body>
</html>
